{% load i18n %}
{% if messages %}
<div
    x-data="{ messages: [
        {% for message in messages %}
            {
                text: '{{ message|escapejs }}',
                tag: '{{ message.tags }}',
                show: true
            },
        {% endfor %}
    ] }"
    x-init="
        messages.forEach((message, index) => {
            setTimeout(() => message.show = false, 4000 + index * 300)
        })
    "
    class="fixed top-4 right-4 z-50 flex w-full max-w-xs flex-col gap-2"
>
    <template x-for="(message, index) in messages" :key="index">
        <div
            x-show="message.show"
            x-transition:enter="transition ease-out duration-200"
            x-transition:enter-start="opacity-0 translate-y-1"
            x-transition:enter-end="opacity-100 translate-y-0"
            x-transition:leave="transition ease-in duration-150"
            x-transition:leave-start="opacity-100 translate-y-0"
            x-transition:leave-end="opacity-0 translate-y-1"
            class="rounded-lg border border-default bg-neutral-primary px-4 py-3 shadow-sm"
            :class="{
                'border-l-2 border-l-success': message.tag.includes('success'),
                'border-l-2 border-l-danger': message.tag.includes('error'),
                'border-l-2 border-l-info': message.tag.includes('info'),
                'border-l-2 border-l-warning': message.tag.includes('warning')
            }"
        >
            <div class="flex items-start justify-between gap-3">
                <div class="flex items-start gap-2.5">
                    <i x-show="message.tag.includes('success')" class="ph-fill ph-check-circle size-5 shrink-0 text-success"></i>
                    <i x-show="message.tag.includes('error')" class="ph-fill ph-x-circle size-5 shrink-0 text-danger"></i>
                    <i x-show="message.tag.includes('warning')" class="ph-fill ph-warning-circle size-5 shrink-0 text-warning"></i>
                    <i x-show="message.tag.includes('info')" class="ph-fill ph-info size-5 shrink-0 text-info"></i>
                    <span x-text="message.text" class="text-normal text-body"></span>
                </div>
                <button type="button" @click="message.show = false" class="shrink-0 text-body-subtle hover:text-heading">
                    <i class="ph ph-x size-4"></i>
                </button>
            </div>
        </div>
    </template>
</div>
{% endif %}
