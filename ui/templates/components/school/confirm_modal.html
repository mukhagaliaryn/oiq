{% load i18n %}
<div
    x-data="{
        open: false,
        message: '',
        issueRequest: null
    }"
    x-init="
        document.body.addEventListener('htmx:confirm', (event) => {
            if (!event.detail.elt.hasAttribute('hx-confirm')) return;
            event.preventDefault();
            message = event.detail.question;
            issueRequest = event.detail.issueRequest;
            open = true;
        });
    "
    x-show="open"
    x-cloak
    x-transition.opacity
    class="fixed inset-0 z-60 flex items-center justify-center bg-dark-backdrop/50 p-4"
    style="display:none"
>
    <div @click.away="open = false" class="w-full max-w-md rounded-xl border border-default bg-neutral-primary p-5">
        <div class="flex items-center gap-3">
            <span class="flex size-9 shrink-0 items-center justify-center rounded-lg bg-danger-soft text-danger">
                <i class="ph ph-trash size-4"></i>
            </span>
            <p class="font-medium" x-text="message"></p>
        </div>

        <div class="mt-5 flex justify-end gap-2">
            <button
                type="button"
                @click="open = false"
                class="rounded-lg border border-default px-4 py-2 text-normal font-medium hover:bg-neutral-secondary"
            >
                {% translate "Cancel" %}
            </button>
            <button
                type="button"
                @click="open = false; issueRequest(true)"
                class="rounded-lg bg-danger px-4 py-2 text-normal font-medium text-neutral-primary hover:bg-danger-strong"
            >
                {% translate "Delete" %}
            </button>
        </div>
    </div>
</div>
