{% load i18n %}
{% if messages %}
<div
    x-data="{ messages: [
        {% for message in messages %}
            {
                text: '{{ message|escapejs }}',
                tag: '{{ message.tags }}',
                show: true
            },
        {% endfor %}
    ] }"
    x-init="
        messages.forEach((message, index) => {
            setTimeout(() => message.show = false, 4000 + index * 300)
        })
    "
    class="fixed top-0 md:top-6 right-0 md:right-6 z-50 flex w-full md:max-w-sm p-2 md:p-0 flex-col gap-2"
>
    <template x-for="(message, index) in messages" :key="index">
        <div
            x-show="message.show"
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 translate-x-4"
            x-transition:enter-end="opacity-100 translate-x-0"
            x-transition:leave="transition ease-in duration-200"
            x-transition:leave-start="opacity-100 translate-x-0"
            x-transition:leave-end="opacity-0 translate-x-4"
            class="rounded-2xl border border-default bg-neutral-secondary p-4"
            :class="{
                'toast-success': message.tag.includes('success'),
                'toast-error': message.tag.includes('error'),
                'toast-info': message.tag.includes('info'),
                'toast-warning': message.tag.includes('warning')
            }"
        >
            <div class="flex items-start justify-between gap-4">
                <div class="flex gap-3">
                    <svg
                        x-show="message.tag.includes('success')"
                        xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-check shrink-0 text-success">
                        <path d="M20 6 9 17l-5-5" />
                    </svg>
                    <svg
                        x-show="message.tag.includes('error')"
                        xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-info shrink-0 text-danger">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M12 16v-4" />
                        <path d="M12 8h.01" />
                    </svg>
                    <svg
                        x-show="message.tag.includes('warning')"
                        xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-triangle-alert shrink-0 text-warning">
                        <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3" />
                        <path d="M12 9v4" />
                        <path d="M12 17h.01" />
                    </svg>
                    <svg
                        x-show="message.tag.includes('info')"
                        xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-info shrink-0 text-info">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M12 16v-4" />
                        <path d="M12 8h.01" />
                    </svg>

                    <span x-text="message.text" class="text-normal flex-1"></span>
                </div>

                <button
                    type="button"
                    @click="message.show = false"
                    class="hover:opacity-50 cursor-pointer text-body shrink-0"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x">
                        <path d="M18 6 6 18" />
                        <path d="m6 6 12 12" />
                    </svg>
                </button>
            </div>
        </div>
    </template>
</div>
{% endif %}
