{% load i18n static tailwind_tags %}
{% get_current_language as LANGUAGE_CODE %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}" data-theme="light">
<head>
    <title>{% block title %}{% endblock %} | OIQ</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="shortcut icon" href="{% static 'images/icon.png' %}" type="image/x-icon">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    {% tailwind_css %}
    {% block css %}
    {% endblock css %}

    <!-- CDNs -->
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>  <!-- htmx -->
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>  <!-- Alpine JS -->
    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.7.1/dist/dotlottie-wc.js" type="module"></script>  <!-- dotLottie -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>  <!-- Lucide Icons -->
</head>

<body class="font-inter text-base text-heading">
    {% if messages %}
        <div
            x-data="{ messages: [
                {% for message in messages %}
                    {
                        text: '{{ message|escapejs }}',
                        tag: '{{ message.tags }}',
                        show: true
                    },
                {% endfor %}
            ] }"
            x-init="
                messages.forEach((message, index) => {
                    setTimeout(() => message.show = false, 4000 + index * 300)
                })
            "
            class="fixed bottom-6 right-6 z-50 flex w-full max-w-sm flex-col-reverse gap-2"
        >
            <template x-for="(message, index) in messages" :key="index">
                <div
                    x-show="message.show"
                    x-transition:enter="transition ease-out duration-300"
                    x-transition:enter-start="opacity-0 translate-y-4"
                    x-transition:enter-end="opacity-100 translate-y-0"
                    x-transition:leave="transition ease-in duration-200"
                    x-transition:leave-start="opacity-100 translate-y-0"
                    x-transition:leave-end="opacity-0 translate-y-4"
                    class="rounded-2xl border border-default bg-neutral-secondary p-4"
                    :class="{
                        'toast-success': message.tag.includes('success'),
                        'toast-error': message.tag.includes('error'),
                        'toast-info': message.tag.includes('info'),
                        'toast-warning': message.tag.includes('warning')
                    }"
                >
                    <div class="flex items-start justify-between gap-4">
                        <div class="flex gap-3">
                            <svg 
                                x-show="message.tag.includes('success')"
                                xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-check-icon lucide-check text-success">
                                <path d="M20 6 9 17l-5-5" />
                            </svg>
                            <svg 
                                x-show="message.tag.includes('error')"
                                xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-info-icon lucide-info text-danger">
                                <circle cx="12" cy="12" r="10" />
                                <path d="M12 16v-4" />
                                <path d="M12 8h.01" />
                            </svg>

                            <span x-text="message.text" class="text-normal flex-1"></span>
                        </div>

                        <button
                            type="button"
                            @click="message.show = false"
                            class="hover:opacity-50 cursor-pointer text-body"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x-icon lucide-x">
                                <path d="M18 6 6 18" />
                                <path d="m6 6 12 12" />
                            </svg>
                        </button>
                    </div>
                </div>
            </template>
        </div>
    {% endif %}

    <div
        x-data="{
            open: false,
            message: '',
            issueRequest: null
        }"
        x-init="
            document.body.addEventListener('htmx:confirm', (event) => {
                if (!event.detail.elt.hasAttribute('hx-confirm')) return;
                event.preventDefault();
                message = event.detail.question;
                issueRequest = event.detail.issueRequest;
                open = true;
            });
        "
        x-show="open"
        x-cloak
        x-transition.opacity
        class="fixed inset-0 z-60 flex items-center justify-center bg-dark-backdrop/50 p-4"
        style="display:none"
    >
        <div @click.away="open = false" class="w-full max-w-md rounded-3xl bg-neutral-primary p-6">
            <div class="flex items-center gap-3">
                <span class="flex size-10 shrink-0 items-center justify-center rounded-full bg-danger-soft text-danger">
                    <i data-lucide="trash-2" class="size-5"></i>
                </span>
                <p class="font-bold" x-text="message"></p>
            </div>

            <div class="mt-6 flex justify-end gap-2">
                <button
                    type="button"
                    @click="open = false"
                    class="rounded-full border border-default px-5 py-2.5 font-medium hover:bg-neutral-secondary"
                >
                    {% translate "Cancel" %}
                </button>
                <button
                    type="button"
                    @click="open = false; issueRequest(true)"
                    class="rounded-full bg-danger px-5 py-2.5 font-medium text-neutral-primary hover:bg-danger-strong"
                >
                    {% translate "Delete" %}
                </button>
            </div>
        </div>
    </div>

    <main>
        {% block base %}{% endblock base %}
    </main>

    {% block js %}{% endblock js %}

    <script>
        lucide.createIcons();

        // Alpine (x-show/:class) manages "style"/"class" itself; htmx's attribute
        // settling would otherwise overwrite those right after a swap and undo it.
        htmx.config.attributesToSettle = [];

        document.body.addEventListener('htmx:configRequest', function (event) {
            const match = document.cookie.match(/(^|;\s*)csrftoken=([^;]*)/);
            event.detail.headers['X-CSRFToken'] = match ? decodeURIComponent(match[2]) : null;

            event.detail.elt.querySelectorAll('[data-oiq-editor]').forEach(function (el) {
                if (el.oiqEditorInstance && el.name) {
                    el.oiqEditorInstance.updateSourceElement();
                    event.detail.parameters[el.name] = el.value;
                }
            });
        });

        document.body.addEventListener('htmx:afterSwap', function (event) {
            lucide.createIcons();
            event.target.dispatchEvent(new Event('formset:added', { bubbles: true }));
        });
    </script>
</body>
</html>
