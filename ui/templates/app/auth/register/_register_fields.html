{% for field in form.visible_fields %}
<div>
    <label class="mb-2 block text-sm font-medium text-heading" for="{{ field.id_for_label }}">
        {{ field.label }}
    </label>

    {{ field }}

    {% if field.help_text %}
        <p class="mt-1 text-xs text-body">{{ field.help_text }}</p>
    {% endif %}

    {% for error in field.errors %}
        <p class="mt-1 text-sm text-red-500">{{ error }}</p>
    {% endfor %}
</div>
{% endfor %}

{% if form.non_field_errors %}
    <div class="rounded-xl border border-red-200 bg-red-50 p-3 text-sm text-red-600">
        {{ form.non_field_errors }}
    </div>
{% endif %}
