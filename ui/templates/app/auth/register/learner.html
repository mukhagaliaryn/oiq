{% extends "layouts/auth_layout.html" %}

{% block title %}Оқушы ретінде тіркелу{% endblock title %}


{% block auth_layout %}
<div class="w-full">
    <div class="rounded-2xl border border-default bg-neutral-primary p-6 shadow-sm">
        <h1 class="text-2xl font-semibold text-heading">Оқушы ретінде тіркелу</h1>
        <p class="mt-2 text-sm text-body">Жеке оқу кеңістігіңізді бастаңыз</p>

        <form method="post" class="mt-6 space-y-5">
            {% csrf_token %}

            {% include 'app/auth/register/_register_fields.html' %}

            <button type="submit" class="w-full rounded-xl bg-brand px-4 py-3 text-sm font-medium text-white">
                Тіркелу
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-body">
            Аккаунтыңыз бар ма?
            <a href="{% url 'main:login' %}" class="font-medium text-brand">Кіру</a>
        </p>
    </div>
</div>
{% endblock %}
